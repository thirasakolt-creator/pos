<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ปิดงานแจ้งซ่อม – มณีจันทร์</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   ROOT VARIABLES
══════════════════════════════════════════ */
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#21253a;--border:#2e3350;
  --accent:#3b7eff;--accent2:#00d4aa;--warn:#ff6b35;--danger:#ff4444;
  --text:#e8ecf4;--muted:#7a82a0;--success:#22c55e;--r:12px;
  --shift-morning:#f59e0b;--shift-noon:#3b82f6;--shift-night:#8b5cf6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── Page system ── */
.page{display:none;min-height:100vh;flex-direction:column;}
.page.on{display:flex;}

/* ── Topbar ── */
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.topbar-info{flex:1;}
.topbar-title{font-size:16px;font-weight:700;}
.topbar-sub{font-size:11px;color:var(--muted);}
.led{width:12px;height:12px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.led.syncing{background:var(--danger);animation:blink .7s infinite;}
.led.ok{background:var(--success);box-shadow:0 0 6px var(--success);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* ── Sticky header group ── */
.sticky-head{position:sticky;top:0;z-index:90;background:var(--bg);flex-shrink:0;}
.search-wrap{padding:10px 16px 6px;}
.search-box{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;color:var(--text);
  font-family:'Sarabun',sans-serif;font-size:14px;outline:none;transition:border .2s;
}
.search-box:focus{border-color:var(--accent);}
.search-box::placeholder{color:var(--muted);}
.tabs{display:flex;padding:0 16px 8px;gap:6px;flex-wrap:wrap;}
.tab{
  padding:5px 14px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:'Sarabun',sans-serif;
  font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.count-bar{padding:0 16px 8px;font-size:12px;color:var(--muted);}
.count-bar b{color:var(--accent2);}

/* ── Scrollable job list ── */
.job-scroll{flex:1;overflow-y:auto;padding:0 16px 100px;}
.job-list{display:flex;flex-direction:column;gap:10px;padding-top:4px;}

/* ── Job Card ── */
.job-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;display:flex;align-items:stretch;cursor:pointer;transition:all .15s;
}
.job-card:active{transform:scale(.985);}
.job-card:hover{border-color:var(--accent);}
.jc-img{width:78px;flex-shrink:0;background:#0d0f1a;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.jc-img img{width:100%;height:100%;object-fit:cover;display:block;}
.jc-img .noimg{font-size:26px;color:var(--border);}
.jc-body{flex:1;padding:10px 12px;overflow:hidden;}
.jc-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.jc-dept{font-size:15px;font-weight:700;color:var(--accent2);letter-spacing:.5px;}
.jc-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap;}
.badge-a{background:rgba(255,107,53,.15);color:var(--warn);border:1px solid rgba(255,107,53,.3);}
.badge-b{background:rgba(59,126,255,.12);color:var(--accent);border:1px solid rgba(59,126,255,.25);}
.badge-c{background:rgba(122,130,160,.1);color:var(--muted);border:1px solid var(--border);}
.jc-detail{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.jc-meta{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── FAB group ── */
.fab-group{position:fixed;bottom:24px;right:20px;z-index:200;display:flex;flex-direction:column;align-items:flex-end;gap:12px;}
.fab{
  width:56px;height:56px;border-radius:50%;border:none;
  background:var(--accent2);color:#0f1117;
  font-size:28px;line-height:1;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,212,170,.45);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s;
}
.fab:active{transform:scale(.9);}
.fab-chem{
  width:48px;height:48px;border-radius:50%;border:none;
  background:#8b5cf6;color:#fff;
  font-size:22px;cursor:pointer;
  box-shadow:0 4px 16px rgba(139,92,246,.45);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
.fab-chem:active{transform:scale(.9);}
.fab-chem.hidden{display:none;}

/* ── Empty / Loading ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .ei{font-size:48px;margin-bottom:12px;}
.loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:16px;}
.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Sub topbar ── */
.sub-topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.back-btn{background:none;border:none;color:var(--accent);font-size:22px;cursor:pointer;padding:2px 6px;line-height:1;}
.sub-title{flex:1;font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.form-scroll{flex:1;overflow-y:auto;padding:16px 16px 100px;}
.form-body{display:flex;flex-direction:column;gap:14px;}

/* ── before-img ── */
.before-img{border-radius:var(--r);overflow:hidden;background:var(--card);border:1px solid var(--border);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;position:relative;}
.before-img img{width:100%;height:100%;object-fit:cover;display:block;}
.no-photo{display:flex;flex-direction:column;align-items:center;gap:8px;font-size:40px;color:var(--border);}
.no-photo span{font-size:12px;color:var(--muted);font-family:'Sarabun',sans-serif;}
.before-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:rgba(255,255,255,.7);font-size:11px;text-align:center;padding:4px;}

/* ── info card ── */
.info-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.ic-head{padding:7px 14px;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--accent);background:rgba(59,126,255,.07);border-bottom:1px solid var(--border);text-transform:uppercase;}
.ic-row{display:flex;padding:8px 14px;border-bottom:1px solid rgba(46,51,80,.4);gap:8px;}
.ic-row:last-child{border-bottom:none;}
.ic-lbl{font-size:12px;color:var(--muted);flex-shrink:0;width:88px;padding-top:1px;}
.ic-val{font-size:13px;flex:1;word-break:break-word;}
.ic-val.hl{color:var(--warn);font-weight:500;}

/* ── form card ── */
.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.fc-head{padding:7px 14px;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--accent2);background:rgba(0,212,170,.06);border-bottom:1px solid var(--border);text-transform:uppercase;}
.fc-body{padding:14px;display:flex;flex-direction:column;gap:14px;}

/* ── field ── */
.flabel{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;letter-spacing:.3px;}
.flabel .req{color:var(--danger);}
.flabel .col-name{color:var(--accent2);font-weight:700;}

input[type="date"],input[type="number"],select,textarea,.text-input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;color:var(--text);
  font-family:'Sarabun',sans-serif;font-size:14px;outline:none;
  transition:border .2s;-webkit-appearance:none;appearance:none;
}
input[type="date"]:focus,input[type="number"]:focus,select:focus,textarea:focus,.text-input:focus{border-color:var(--accent);}
select option{background:var(--card);}
textarea{resize:vertical;min-height:72px;}
input[type="number"]{-moz-appearance:textfield;}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}

/* ── date display BE ── */
.date-display{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;font-size:14px;color:var(--text);
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;
}
.date-display:hover{border-color:var(--accent);}
.dd-placeholder{color:var(--muted);}
.dd-val{color:var(--accent2);font-weight:500;}

/* ── YES/NO toggle ── */
.yn-wrap{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.yn-btn{flex:1;padding:10px;background:var(--surface);color:var(--muted);border:none;font-family:'Sarabun',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;}
.yn-btn.yes-on{background:#16a34a;color:#fff;}
.yn-btn.no-on{background:#dc2626;color:#fff;}

/* ── docno display ── */
.docno-display{background:rgba(0,212,170,.07);border:1px solid rgba(0,212,170,.25);border-radius:8px;padding:10px 14px;font-size:15px;font-weight:700;color:var(--accent2);letter-spacing:1px;font-family:monospace;}

/* ── photo upload ── */
.photo-area{border:2px dashed var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.pa-icon{font-size:28px;}
.pa-txt{font-size:12px;color:var(--muted);text-align:center;}
.photo-btns{display:flex;gap:8px;width:100%;}
.pbtn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'Sarabun',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;}
.pbtn:hover{border-color:var(--accent2);color:var(--accent2);}
.preview-wrap{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:4/3;background:var(--surface);}
.preview-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.preview-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}

/* ── save bar ── */
.save-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:var(--surface);border-top:1px solid var(--border);z-index:200;display:flex;gap:10px;}
.cancel-btn{padding:13px 20px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Sarabun',sans-serif;font-size:15px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.cancel-btn:hover{border-color:var(--danger);color:var(--danger);}
.save-btn{flex:1;padding:13px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.save-btn:active{transform:scale(.97);}
.save-btn.saving{background:var(--warn);}
.save-btn:disabled{background:var(--border);cursor:not-allowed;}

/* ── toast ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--card);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;border:1px solid var(--border);opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--success);color:var(--success);}
.toast.err{border-color:var(--danger);color:var(--danger);}

/* ── overlay ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.overlay.show{display:flex;}
.ov-txt{font-size:14px;color:var(--muted);}
.ov-bar{width:200px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.ov-inner{height:100%;background:var(--accent);width:0;transition:width .4s;border-radius:2px;}

/* ── hidden ── */
.hidden-input{display:none;}

/* ══════════════════════════════════════════
   LOGIN PAGE
══════════════════════════════════════════ */
.login-page{
  display:none;min-height:100vh;flex-direction:column;
  align-items:center;justify-content:flex-start;
  background:var(--bg);
  padding:0 0 40px 0;
  overflow-y:auto;
}
.login-page.on{display:flex;}

/* logo area */
.logo-area{
  width:100%;display:flex;flex-direction:column;align-items:center;
  padding:40px 20px 24px;
  background:linear-gradient(180deg,rgba(59,126,255,.08) 0%,transparent 100%);
  border-bottom:1px solid var(--border);
  margin-bottom:20px;
}
.logo-btn{
  background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:8px;border-radius:16px;transition:transform .15s;
  -webkit-tap-highlight-color:transparent;
}
.logo-btn:active{transform:scale(.94);}
.logo-icon{
  width:72px;height:72px;border-radius:20px;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  box-shadow:0 8px 32px rgba(59,126,255,.35);
  transition:box-shadow .3s;
}
.logo-icon:hover{box-shadow:0 8px 32px rgba(59,126,255,.55);}
.logo-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:.5px;}
.logo-sub{font-size:12px;color:var(--muted);}
.logo-tap-hint{font-size:10px;color:rgba(122,130,160,.4);margin-top:4px;}

/* user grid */
.login-section{width:100%;max-width:480px;padding:0 16px;}
.ls-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;padding:0 2px;}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.user-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;transition:all .15s;position:relative;overflow:hidden;
}
.user-card:active{transform:scale(.96);}
.user-card:hover{border-color:var(--accent2);}
.user-card.logged-in{opacity:.45;pointer-events:none;}
.user-card.logged-in::after{content:"ออนไลน์";position:absolute;top:6px;right:6px;font-size:9px;background:var(--success);color:#000;padding:2px 6px;border-radius:8px;font-weight:700;}
.uc-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;}
.uc-avatar.leader{background:linear-gradient(135deg,var(--warn),#ff4444);}
.uc-name{font-size:14px;font-weight:600;text-align:center;}
.uc-role{font-size:10px;color:var(--muted);}
.uc-role.leader-tag{color:var(--warn);}

/* password modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:800;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:340px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:6px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}
.modal-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:16px;outline:none;transition:border .2s;letter-spacing:4px;text-align:center;}
.modal-input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:10px;margin-top:16px;}
.modal-cancel{flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Sarabun',sans-serif;font-size:14px;cursor:pointer;}
.modal-ok{flex:2;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}

/* ══════════════════════════════════════════
   SHIFT SELECT PAGE
══════════════════════════════════════════ */
.shift-page{display:none;min-height:100vh;flex-direction:column;background:var(--bg);}
.shift-page.on{display:flex;}
.shift-scroll{flex:1;overflow-y:auto;padding:24px 16px 40px;}
.shift-header{text-align:center;margin-bottom:32px;}
.shift-header h2{font-size:22px;font-weight:700;margin-bottom:6px;}
.shift-header p{font-size:13px;color:var(--muted);}
.shift-grid{display:flex;flex-direction:column;gap:14px;max-width:400px;margin:0 auto;}
.shift-card{
  background:var(--card);border:2px solid var(--border);border-radius:16px;
  padding:20px;display:flex;align-items:center;gap:16px;
  cursor:pointer;transition:all .2s;
}
.shift-card:active{transform:scale(.97);}
.shift-card.morning:hover,.shift-card.morning:active{border-color:var(--shift-morning);background:rgba(245,158,11,.06);}
.shift-card.noon:hover,.shift-card.noon:active{border-color:var(--shift-noon);background:rgba(59,130,246,.06);}
.shift-card.night:hover,.shift-card.night:active{border-color:var(--shift-night);background:rgba(139,92,246,.06);}
.sc-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.sc-icon.morning{background:rgba(245,158,11,.15);}
.sc-icon.noon{background:rgba(59,130,246,.15);}
.sc-icon.night{background:rgba(139,92,246,.15);}
.sc-info{flex:1;}
.sc-name{font-size:17px;font-weight:700;margin-bottom:3px;}
.sc-name.morning{color:var(--shift-morning);}
.sc-name.noon{color:var(--shift-noon);}
.sc-name.night{color:var(--shift-night);}
.sc-time{font-size:12px;color:var(--muted);}
.sc-arr{font-size:20px;color:var(--border);}

/* ══════════════════════════════════════════
   ROUTINE PAGE (เช้า / เที่ยง)
══════════════════════════════════════════ */
.routine-page{display:none;min-height:100vh;flex-direction:column;background:var(--bg);}
.routine-page.on{display:flex;}

/* progress bar routine */
.routine-progress{padding:12px 16px 0;}
.rp-label{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;}
.rp-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.rp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s ease;}

/* section divider */
.section-divider{
  display:flex;align-items:center;gap:10px;
  padding:0 2px;margin:4px 0 2px;
}
.sd-line{flex:1;height:1px;background:var(--border);}
.sd-txt{font-size:11px;color:var(--muted);white-space:nowrap;font-weight:600;letter-spacing:.5px;}

/* value display (filled) */
.val-display{
  background:rgba(0,212,170,.07);border:1px solid rgba(0,212,170,.2);
  border-radius:8px;padding:10px 12px;font-size:15px;font-weight:700;
  color:var(--accent2);display:flex;align-items:center;justify-content:space-between;
}
.vd-unit{font-size:11px;font-weight:400;color:var(--muted);}

/* warn box */
.warn-box{
  background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);
  border-radius:8px;padding:10px 14px;font-size:13px;color:var(--warn);
  display:flex;align-items:center;gap:8px;
}

/* complete banner */
.complete-banner{
  background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);
  border-radius:12px;padding:16px;text-align:center;
}
.cb-icon{font-size:32px;margin-bottom:8px;}
.cb-txt{font-size:15px;font-weight:700;color:var(--success);margin-bottom:4px;}
.cb-sub{fon
