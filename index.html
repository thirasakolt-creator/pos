<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload to Google Drive</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        #status { margin-top: 10px; color: blue; }
    </style>
</head>
<body>

<div class="container">
    <h2>อัพโหลดรูปภาพเข้า Drive</h2>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="uploadFile()">อัพโหลด</button>
    <div id="status"></div>
</div>

<script>
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        
        if (fileInput.files.length === 0) {
            alert('กรุณาเลือกไฟล์ก่อน');
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();
        
        status.innerText = "กำลังอัพโหลด... กรุณารอสักครู่";

        reader.onload = async function() {
            const base64 = reader.result.split(',')[1];
            const payload = {
                base64: base64,
                mimeType: file.type,
                fileName: file.name
            };

            // *** วาง URL ของ Google Apps Script ที่คุณก๊อปปี้มาที่นี่ ***
            const scriptUrl = "https://script.google.com/macros/s/AKfycbyPALmrw7fndrfJB3K3OqvRh2va0Pfj6vQONTCxOnWKuKpg3PyW7sW3SKQPT2IwhHYw/exec";

            try {
                const response = await fetch(scriptUrl, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (result.status === "success") {
                    status.innerHTML = `อัพโหลดสำเร็จ! <br><a href="${result.url}" target="_blank">ดูไฟล์</a>`;
                } else {
                    status.innerText = "เกิดข้อผิดพลาด: " + result.message;
                }
            } catch (error) {
                status.innerText = "การเชื่อมต่อผิดพลาด!";
            }
        };

        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
